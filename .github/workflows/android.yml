name: Build APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-22.04 # Используем стабильную версию Ubuntu
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
          pip3 install --user --upgrade buildozer Cython==0.29.33 virtualenv

      - name: Build with Buildozer
        run: |
          export PATH=$PATH:$HOME/.local/bin
      
          mkdir -p $HOME/.buildozer/android/platform/android-sdk/licenses
          
          echo -e "\n8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb743402295581237459\n24333f8a63b6825ea9c5573f435157a807233563" > $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          
          export BUILDOZER_ALLOW_ORG_TEST_DOMAIN=1
          
          buildozer android debug
          
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk
